<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitMirror Vercel Store Simulator</title>
  <!-- Beautiful styling accents -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

  <div class="max-w-md w-full bg-slate-800 rounded-3xl p-6 border border-slate-700/50 shadow-2xl space-y-6">
    <!-- Active Product Card Header -->
    <div class="space-y-2">
      <span class="text-xs font-black text-indigo-400 uppercase tracking-widest bg-indigo-500/10 px-2.5 py-1 rounded-full">AI Live Demonstration</span>
      <h1 id="product-title" class="text-2xl font-bold tracking-tight">Luxury Designer Hoodie</h1>
      <p class="text-sm text-slate-400">Interact with the real-time sandboxed try-on window below.</p>
    </div>

    <!-- Product Image Element to update on successful Handshake! -->
    <div class="aspect-square w-full rounded-2xl overflow-hidden bg-slate-950 relative border border-slate-700">
      <img id="product-image-display" 
           src="https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&w=600&q=80" 
           alt="Product Image" 
           class="w-full h-full object-cover transition-all duration-500" />
      
      <!-- Handshake Success Badge overlay -->
      <div id="success-badge" class="hidden absolute top-4 left-4 bg-emerald-500 text-white text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full animate-bounce shadow">
        ✓ AI Try-On Applied
      </div>
    </div>

    <!-- Dynamic Try-On Widget Button Tag -->
    <div class="space-y-4">
      <!-- 
        The integration script tag is loaded dynamically and will find this element. 
        Note that data-widget-mode is auto-configured to popup to bypass sandbox framing limitations.
      -->
      <script 
        src="https://ais-pre-xo5wwmfl5rxl2yh5ngu72o-325634743966.europe-west2.run.app/widget.js"
        data-merchant-id="M_837492"
        data-widget-type="pdp"
        data-widget-mode="popup"
        data-product-title="Luxury Designer Hoodie"
        data-product-image="https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&w=600&q=80"
        data-button-text="✨ Try It On Personally"
        data-primary-color="#6366f1">
      </script>
    </div>
  </div>

  <!-- The Listening Handshake Logic -->
  <script>
    // Listen for cross-domain payload handshakes from FitMirror widget popup.
    window.addEventListener('message', function(event) {
      console.log("⚡ Received message from popup:", event.data);

      // Check if message is our successful tryon event
      if (event.data && event.data.type === 'fitmirror-tryon-success') {
        const generatedImageUrl = event.data.imageUrl;
        console.log("🏆 Success handshake complete! Custom look image URL:", generatedImageUrl);

        // Update the main store image to the newly generated try-on look!
        const storeImage = document.getElementById('product-image-display');
        if (storeImage) {
          storeImage.src = generatedImageUrl;
        }

        // Show the success badge
        const badge = document.getElementById('success-badge');
        if (badge) {
          badge.classList.remove('hidden');
        }
      }
    });
  </script>
</body>
</html>
